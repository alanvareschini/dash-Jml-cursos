services:
  php-apache:
    build: .
    container_name: jml_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    networks:
      - jml-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: jml_db
    restart: always
    environment:
      MYSQL_DATABASE: jml_cursos
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jml-network

networks:
  jml-network:
    driver: bridge

volumes:
  mysql_data: